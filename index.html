!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Payment Calculator</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="container">
        <h1>Loan Payment Calculator</h1>
        <form id="loan-form">
            <div class="form-group">
                <label for="amount">Loan Amount ($):</label>
                <input type="number" id="amount" placeholder="Enter loan amount" required>
            </div>
            <div class="form-group">
                <label for="interest">Annual Interest Rate (%):</label>
                <input type="number" id="interest" placeholder="Enter interest rate" required>
            </div>
            <div class="form-group">
                <label for="years">Loan Term (years):</label>
                <input type="number" id="years" placeholder="Enter loan term in years" required>
            </div>
            <button type="submit">Calculate</button>
        </form>
        <div id="results" class="hidden">
            <h2>Monthly Payment: $<span id="monthly-payment"></span></h2>
            <h3>Total Payment: $<span id="total-payment"></span></h3>
            <h3>Total Interest: $<span id="total-interest"></span></h3>
        </div>
    </div>
    <script defer src="src/app.js"></script>
</body>
</html>
